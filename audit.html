                <div style="display: flex; gap: 10px;">
                    <button onclick="exportAuditExcel()" style="background-color: #10b981; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px;">
                        📊 Exporter Excel
                    </button>

                        📄 Exporter PDF
                    </button>
                </div>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr style="background:#f1f5f9;">
                            <th>Date</th><th>Type</th><th>Description</th><th style="color:#10b981;">Entrée (+)</th><th style="color:#ef4444;">Sortie (-)</th><th style="color:#1877f2;">Solde (Trésorerie Nette)</th>
                        </tr>
                    </thead>
                    <tbody id="financialAuditBody"></tbody>
                </table>
